version: '3.8'

services:
  rocky-calculator:
    build:
      context: ./rocky-calculator
      dockerfile: Dockerfile
    container_name: rocky-calculator
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=./data/rocky-calculator.sqlite
      - NEXT_PUBLIC_APP_NAME=Rocky Calculator
    volumes:
      - rocky_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  rocky_data:
    driver: local
